<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screw Sort</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --text: #e8e4dc;
    --muted: #7a7670;
    --accent: #c8a96e;
    --win: #6ec8a9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px 40px;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 28px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .meta {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #moves-display {
    color: var(--text);
    font-size: 0.85rem;
  }

  #game-area {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .tube {
    width: 64px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 36px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    min-height: 200px;
    user-select: none;
  }

  .tube::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }

  .tube.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.18), 0 0 20px rgba(200, 169, 110, 0.08);
    transform: translateY(-4px);
  }

  .tube.valid-target {
    border-color: #6ec8a9;
    box-shadow: 0 0 0 2px rgba(110, 200, 169, 0.15);
  }

  .tube.complete {
    border-color: var(--win);
    opacity: 0.7;
  }

  .screw {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 0;
  }

  .screw::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: rgba(0,0,0,0.35);
    border-radius: 50%;
  }

  /* Cross/slot line */
  .screw::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 3px;
    background: rgba(0,0,0,0.4);
    border-radius: 2px;
    z-index: 1;
    box-shadow: 0 0 0 0 transparent;
  }

  .screw.slot-cross {
    background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.22) 0%, transparent 60%);
  }

  .tube.selected .screw:last-child {
    transform: translateY(-6px) scale(1.08);
  }

  /* Color variants */
  .c0  { background: #d64f4f; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c1  { background: #4f8fd6; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c2  { background: #6dc84a; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c3  { background: #d6a24f; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c4  { background: #a44fd6; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c5  { background: #4fd6c8; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c6  { background: #d64fa4; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }
  .c7  { background: #c8d64f; box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.25); }

  .controls {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    justify-content: center;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  #level-display {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
    width: 100%;
    max-width: 480px;
  }

  #message {
    height: 28px;
    font-size: 0.78rem;
    color: var(--win);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 0.3s;
    width: 100%;
    max-width: 480px;
  }

  #message.show { opacity: 1; }

  /* Win overlay */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.88);
    backdrop-filter: blur(6px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  #win-overlay.show { display: flex; }

  #win-overlay h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--win);
    letter-spacing: -0.02em;
  }

  #win-overlay p {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  #win-overlay .win-moves {
    font-size: 1.1rem;
    color: var(--accent);
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 39px,
      rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px
    );
    pointer-events: none;
    z-index: 0;
  }

  header, #game-area, .controls, #level-display, #message { position: relative; z-index: 1; }
</style>
</head>
<body>

<header>
  <h1>Screw Sort</h1>
  <div>
    <div class="meta" id="moves-display">moves: 0</div>
  </div>
</header>

<div id="level-display">Level 1</div>
<div id="message"></div>
<div id="game-area"></div>

<div class="controls">
  <button id="undo-btn">↩ Undo</button>
  <button id="restart-btn">↺ Restart</button>
  <button id="next-btn" class="primary" style="display:none">Next →</button>
</div>

<div id="win-overlay">
  <h2>Sorted.</h2>
  <p class="win-moves" id="win-moves-text"></p>
  <p style="color:var(--muted)">all screws in order</p>
  <button class="primary" onclick="nextLevel()" style="margin-top:12px">Next Level →</button>
</div>

<script>
// ─── Game State ───────────────────────────────────────────────────────────────

const TUBE_CAPACITY = 4;

// Level configs: [numColors, numEmptyTubes]
const LEVELS = [
  [3, 1],
  [4, 1],
  [4, 2],
  [5, 2],
  [6, 2],
  [6, 3],
  [7, 2],
  [8, 2],
  [8, 3],
];

let state = {
  tubes: [],
  selected: null,
  moves: 0,
  history: [],
  level: 0,
  won: false,
};

function generateLevel(levelIdx) {
  const [numColors, numEmpty] = LEVELS[Math.min(levelIdx, LEVELS.length - 1)];
  // Create screws: 4 of each color
  let allScrews = [];
  for (let c = 0; c < numColors; c++) {
    for (let i = 0; i < TUBE_CAPACITY; i++) allScrews.push(c);
  }
  // Shuffle
  for (let i = allScrews.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allScrews[i], allScrews[j]] = [allScrews[j], allScrews[i]];
  }
  // Fill tubes
  const tubes = [];
  for (let t = 0; t < numColors; t++) {
    tubes.push(allScrews.splice(0, TUBE_CAPACITY));
  }
  // Add empty tubes
  for (let e = 0; e < numEmpty; e++) tubes.push([]);
  return tubes;
}

function deepCopy(tubes) {
  return tubes.map(t => [...t]);
}

function isTubeComplete(tube) {
  if (tube.length !== TUBE_CAPACITY) return false;
  return tube.every(s => s === tube[0]);
}

function isWon() {
  return state.tubes.every(t => t.length === 0 || isTubeComplete(t));
}

function topScrew(tube) {
  return tube.length > 0 ? tube[tube.length - 1] : null;
}

function canMove(from, to) {
  if (from === to) return false;
  const fromTube = state.tubes[from];
  const toTube = state.tubes[to];
  if (fromTube.length === 0) return false;
  if (toTube.length >= TUBE_CAPACITY) return false;
  if (toTube.length === 0) return true;
  return topScrew(fromTube) === topScrew(toTube);
}

function doMove(from, to) {
  state.history.push({ tubes: deepCopy(state.tubes), moves: state.moves });
  // Move all matching top screws
  const color = topScrew(state.tubes[from]);
  while (
    state.tubes[from].length > 0 &&
    topScrew(state.tubes[from]) === color &&
    state.tubes[to].length < TUBE_CAPACITY
  ) {
    state.tubes[to].push(state.tubes[from].pop());
  }
  state.moves++;
  state.selected = null;
}

function undoMove() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.tubes = prev.tubes;
  state.moves = prev.moves;
  state.selected = null;
  state.won = false;
  render();
  hideMessage();
}

// ─── Rendering ────────────────────────────────────────────────────────────────

function render() {
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  state.tubes.forEach((tube, idx) => {
    const el = document.createElement('div');
    el.className = 'tube';
    if (idx === state.selected) el.classList.add('selected');
    if (isTubeComplete(tube) && tube.length > 0) el.classList.add('complete');
    if (state.selected !== null && state.selected !== idx && canMove(state.selected, idx)) {
      el.classList.add('valid-target');
    }

    tube.forEach(color => {
      const screw = document.createElement('div');
      screw.className = `screw c${color}`;
      el.appendChild(screw);
    });

    el.addEventListener('click', () => handleTubeClick(idx));
    area.appendChild(el);
  });

  document.getElementById('moves-display').textContent = `moves: ${state.moves}`;
  document.getElementById('level-display').textContent =
    `Level ${state.level + 1}`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = state.won ? 'inline-block' : 'none';
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.classList.add('show');
}

function hideMessage() {
  document.getElementById('message').classList.remove('show');
}

// ─── Interaction ──────────────────────────────────────────────────────────────

function handleTubeClick(idx) {
  if (state.won) return;
  hideMessage();

  if (state.selected === null) {
    // Select if tube has screws
    if (state.tubes[idx].length > 0 && !isTubeComplete(state.tubes[idx])) {
      state.selected = idx;
      render();
    }
  } else {
    if (idx === state.selected) {
      // Deselect
      state.selected = null;
      render();
    } else if (canMove(state.selected, idx)) {
      doMove(state.selected, idx);
      render();
      if (isWon()) {
        state.won = true;
        render();
        setTimeout(showWin, 420);
      }
    } else {
      // Try to select new tube
      if (state.tubes[idx].length > 0 && !isTubeComplete(state.tubes[idx])) {
        state.selected = idx;
        render();
      } else {
        showMessage('can\'t place here');
        state.selected = null;
        render();
      }
    }
  }
}

function showWin() {
  const overlay = document.getElementById('win-overlay');
  document.getElementById('win-moves-text').textContent = `${state.moves} move${state.moves !== 1 ? 's' : ''}`;
  overlay.classList.add('show');
}

function nextLevel() {
  document.getElementById('win-overlay').classList.remove('show');
  state.level = Math.min(state.level + 1, LEVELS.length - 1);
  startLevel();
}

function startLevel() {
  state.tubes = generateLevel(state.level);
  state.selected = null;
  state.moves = 0;
  state.history = [];
  state.won = false;
  render();
}

// ─── Controls ─────────────────────────────────────────────────────────────────

document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('restart-btn').addEventListener('click', () => {
  if (state.history.length === 0) return;
  // Rewind to very beginning
  const first = state.history[0];
  state.tubes = first.tubes;
  state.moves = 0;
  state.history = [];
  state.selected = null;
  state.won = false;
  render();
  hideMessage();
});
document.getElementById('next-btn').addEventListener('click', nextLevel);

// ─── Init ─────────────────────────────────────────────────────────────────────
startLevel();
</script>
</body>
</html>
