<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screw Sort</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --text: #e8e4dc;
    --muted: #7a7670;
    --accent: #c8a96e;
    --win: #6ec8a9;
    --easy: #6ec8a9;
    --medium: #c8a96e;
    --hard: #d67a4f;
    --expert: #d64f7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 0 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; letter-spacing: -0.02em;
    color: var(--accent);
  }

  #moves-display { color: var(--text); font-size: 0.82rem; }

  #level-bar {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    display: flex; align-items: center; justify-content: space-between;
    margin: 8px 0 4px;
    gap: 10px;
  }

  #level-label {
    font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    white-space: nowrap;
  }

  #diff-badge {
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 10px; border-radius: 20px; border: 1px solid;
  }
  #diff-badge.easy   { color: var(--easy);   border-color: var(--easy);   }
  #diff-badge.medium { color: var(--medium); border-color: var(--medium); }
  #diff-badge.hard   { color: var(--hard);   border-color: var(--hard);   }
  #diff-badge.expert { color: var(--expert); border-color: var(--expert); }

  #level-select-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 12px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  #level-select-btn:hover { border-color: var(--accent); color: var(--accent); }

  #message {
    position: relative; z-index: 1;
    height: 22px; font-size: 0.72rem;
    color: #d66060; letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center; margin-bottom: 4px;
    opacity: 0; transition: opacity 0.3s;
    width: 100%; max-width: 520px;
  }
  #message.show { opacity: 1; }
  #message.ok { color: var(--win); }

  #game-area {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    display: flex; flex-wrap: wrap;
    gap: 9px; justify-content: center;
    margin-bottom: 18px;
  }

  .tube {
    width: 60px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 36px;
    padding: 10px 7px;
    display: flex; flex-direction: column-reverse;
    align-items: center; gap: 5px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    position: relative;
    min-height: 192px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tube::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 17px; height: 7px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-bottom: none; border-radius: 4px 4px 0 0;
  }
  .tube.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,169,110,0.18), 0 0 18px rgba(200,169,110,0.08);
    transform: translateY(-6px);
  }
  .tube.valid-target {
    border-color: var(--win);
    box-shadow: 0 0 0 2px rgba(110,200,169,0.14);
  }
  .tube.complete {
    border-color: var(--win); opacity: 0.6; cursor: default;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(3px); }
  }
  .tube.shake { animation: shake 0.32s ease; }

  .screw {
    width: 40px; height: 40px;
    border-radius: 50%;
    position: relative; flex-shrink: 0;
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  .screw::after {
    content: '';
    position: absolute; inset: 0; margin: auto;
    width: 13px; height: 13px;
    background: rgba(0,0,0,0.3); border-radius: 50%;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }
  .screw::before {
    content: '';
    position: absolute; inset: 0; margin: auto;
    width: 17px; height: 3px;
    background: rgba(0,0,0,0.4); border-radius: 2px; z-index: 1;
  }
  .slot-v {
    position: absolute; inset: 0; margin: auto;
    width: 3px; height: 17px;
    background: rgba(0,0,0,0.4); border-radius: 2px; z-index: 1;
  }
  .tube.selected .screw:last-child { transform: translateY(-4px) scale(1.07); }

  .c0 { background:#d64f4f; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c1 { background:#4f8fd6; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c2 { background:#5ec84a; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c3 { background:#d6a24f; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c4 { background:#a44fd6; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c5 { background:#4fd6c8; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c6 { background:#d64fa4; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c7 { background:#b8d64f; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c8 { background:#4f6ed6; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }
  .c9 { background:#d6d64f; box-shadow:inset 0 2px 5px rgba(255,255,255,0.18),inset 0 -2px 5px rgba(0,0,0,0.3); }

  .controls {
    position: relative; z-index: 1;
    display: flex; gap: 10px;
    width: 100%; max-width: 520px; justify-content: center;
  }
  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.73rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 20px; border-radius: 30px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover, button:active { border-color: var(--accent); color: var(--accent); }
  button.primary { border-color: var(--accent); color: var(--accent); }

  /* ── Level select overlay ── */
  #level-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,14,12,0.95);
    backdrop-filter: blur(8px);
    z-index: 200;
    flex-direction: column; align-items: center;
    padding: 32px 16px 40px; overflow-y: auto;
  }
  #level-overlay.show { display: flex; }
  #level-overlay h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: var(--accent);
    margin-bottom: 20px; letter-spacing: -0.01em;
  }
  #level-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; width: 100%; max-width: 340px;
  }
  .lvl-btn {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem; color: var(--muted);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    padding: 6px 2px;
  }
  .lvl-btn .lnum { font-size: 0.9rem; color: var(--text); }
  .lvl-btn.locked { opacity: 0.28; cursor: default; }
  .lvl-btn.current { border-color: var(--accent); }
  .lvl-btn.done { opacity: 0.6; }
  .lvl-btn.easy-t   { border-color: rgba(110,200,169,0.3); }
  .lvl-btn.medium-t { border-color: rgba(200,169,110,0.3); }
  .lvl-btn.hard-t   { border-color: rgba(214,122,79,0.3);  }
  .lvl-btn.expert-t { border-color: rgba(214,79,122,0.3);  }
  .lvl-btn:not(.locked):hover { transform: scale(1.05); }
  .lvl-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .easy-dot   { background: var(--easy); }
  .medium-dot { background: var(--medium); }
  .hard-dot   { background: var(--hard); }
  .expert-dot { background: var(--expert); }

  #close-overlay {
    margin-top: 22px;
    font-family: 'DM Mono', monospace;
    font-size: 0.73rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 28px; border-radius: 30px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  #close-overlay:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Win overlay ── */
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,14,12,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
  }
  #win-overlay.show { display: flex; }
  #win-overlay h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.3rem; color: var(--win); letter-spacing: -0.02em;
  }
  .win-stat { color: var(--accent); font-size: 1rem; }
  .win-sub { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .win-btns { display: flex; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <h1>Screw Sort</h1>
  <div id="moves-display">moves: 0</div>
</header>

<div id="level-bar">
  <div id="level-label">Level 1 of 30</div>
  <div id="diff-badge" class="easy">Easy</div>
  <button id="level-select-btn">Levels ↗</button>
</div>

<div id="message"></div>
<div id="game-area"></div>

<div class="controls">
  <button id="undo-btn">↩ Undo</button>
  <button id="restart-btn">↺ Restart</button>
  <button id="next-btn" class="primary" style="display:none">Next →</button>
</div>

<!-- Level select -->
<div id="level-overlay">
  <h3>Choose a Level</h3>
  <div id="level-grid"></div>
  <button id="close-overlay">Close</button>
</div>

<!-- Win -->
<div id="win-overlay">
  <h2>Sorted.</h2>
  <div class="win-stat" id="win-stat"></div>
  <div class="win-sub">all screws in order</div>
  <div class="win-btns">
    <button onclick="closeWinGoSelect()">Levels</button>
    <button class="primary" onclick="nextLevel()">Next →</button>
  </div>
</div>

<script>
const CAP = 4;

// Each level: [numColors, numEmpty, scrambleDepth, difficultyTier]
// Tiers: 0=easy, 1=medium, 2=hard, 3=expert
const LEVELS = [
  // ── Easy ──────────────────────────────────────
  [2, 1,  12, 0],  // 1
  [3, 1,  20, 0],  // 2
  [3, 1,  30, 0],  // 3
  [3, 2,  35, 0],  // 4
  [4, 1,  35, 0],  // 5
  // ── Medium ────────────────────────────────────
  [4, 1,  55, 1],  // 6
  [4, 2,  60, 1],  // 7
  [5, 1,  65, 1],  // 8
  [5, 2,  70, 1],  // 9
  [5, 2,  80, 1],  // 10
  [6, 2,  85, 1],  // 11
  [6, 2,  95, 1],  // 12
  // ── Hard ──────────────────────────────────────
  [6, 2, 110, 2],  // 13
  [6, 2, 125, 2],  // 14
  [7, 2, 120, 2],  // 15
  [7, 2, 140, 2],  // 16
  [7, 3, 145, 2],  // 17
  [8, 2, 150, 2],  // 18
  [8, 2, 160, 2],  // 19
  [8, 3, 165, 2],  // 20
  // ── Expert ────────────────────────────────────
  [8, 2, 180, 3],  // 21
  [8, 3, 190, 3],  // 22
  [9, 2, 185, 3],  // 23
  [9, 2, 200, 3],  // 24
  [9, 3, 200, 3],  // 25
  [10,2, 210, 3],  // 26
  [10,2, 220, 3],  // 27
  [10,3, 225, 3],  // 28
  [10,3, 240, 3],  // 29
  [10,3, 260, 3],  // 30
];

const TIER_NAMES  = ['Easy', 'Medium', 'Hard', 'Expert'];
const TIER_KEYS   = ['easy', 'medium', 'hard', 'expert'];
const TIER_DOTCLS = ['easy-dot','medium-dot','hard-dot','expert-dot'];
const TIER_TCLS   = ['easy-t','medium-t','hard-t','expert-t'];

// ── Puzzle engine ──────────────────────────────────────────────────────────────

function rnd(n) { return Math.floor(Math.random() * n); }
function peek(tube) { return tube.length > 0 ? tube[tube.length - 1] : null; }
function clone(tubes) { return tubes.map(t => [...t]); }

function isTubeDone(tube) {
  return tube.length === CAP && tube.every(s => s === tube[0]);
}
function isSolved(tubes) {
  return tubes.every(t => t.length === 0 || isTubeDone(t));
}

function isValidMove(tubes, f, t) {
  if (f === t) return false;
  if (tubes[f].length === 0) return false;
  if (isTubeDone(tubes[f])) return false;
  if (tubes[t].length >= CAP) return false;
  if (tubes[t].length === 0) {
    const c = peek(tubes[f]);
    if (tubes[f].every(s => s === c)) return false; // pointless uniform→empty
    return true;
  }
  return peek(tubes[f]) === peek(tubes[t]);
}

function allMoves(tubes) {
  const moves = [];
  for (let f = 0; f < tubes.length; f++)
    for (let t = 0; t < tubes.length; t++)
      if (isValidMove(tubes, f, t)) moves.push([f, t]);
  return moves;
}

function applyMove(tubes, f, t) {
  const color = peek(tubes[f]);
  while (tubes[f].length > 0 && peek(tubes[f]) === color && tubes[t].length < CAP) {
    tubes[t].push(tubes[f].pop());
  }
}

function generatePuzzle(numColors, numEmpty, depth) {
  // Iterative — no recursion, no stack overflow
  while (true) {
    const tubes = [];
    for (let c = 0; c < numColors; c++) tubes.push(new Array(CAP).fill(c));
    for (let e = 0; e < numEmpty; e++) tubes.push([]);

    let lastF = -1, lastT = -1;
    for (let i = 0; i < depth; i++) {
      let moves = allMoves(tubes);
      const filtered = moves.filter(([f, t]) => !(f === lastT && t === lastF));
      if (filtered.length > 0) moves = filtered;
      if (moves.length === 0) break;
      const [f, t] = moves[rnd(moves.length)];
      applyMove(tubes, f, t);
      lastF = f; lastT = t;
    }

    if (!isSolved(tubes)) return tubes;
    // If we accidentally ended up solved, just retry (loop, not recurse)
  }
}

// ── State ──────────────────────────────────────────────────────────────────────

const G = {
  tubes: [], initial: [],
  selected: null, moves: 0,
  history: [], level: 0, won: false,
  unlocked: 1,   // how many levels are accessible (increases on win)
  completed: new Set(),
};

// Persist progress in localStorage
function saveProgress() {
  try {
    localStorage.setItem('ss_unlocked', G.unlocked);
    localStorage.setItem('ss_completed', JSON.stringify([...G.completed]));
    localStorage.setItem('ss_level', G.level);
  } catch(e) {}
}
function loadProgress() {
  try {
    const u = localStorage.getItem('ss_unlocked');
    const c = localStorage.getItem('ss_completed');
    const l = localStorage.getItem('ss_level');
    if (u) G.unlocked = Math.min(parseInt(u), LEVELS.length);
    if (c) G.completed = new Set(JSON.parse(c));
    if (l) G.level = Math.min(parseInt(l), LEVELS.length - 1);
  } catch(e) {}
}

// ── Render ─────────────────────────────────────────────────────────────────────

function render() {
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  G.tubes.forEach((tube, idx) => {
    const el = document.createElement('div');
    el.className = 'tube';
    const done = isTubeDone(tube);
    if (idx === G.selected) el.classList.add('selected');
    if (done) el.classList.add('complete');
    if (!done && G.selected !== null && G.selected !== idx && isValidMove(G.tubes, G.selected, idx))
      el.classList.add('valid-target');

    tube.forEach(color => {
      const s = document.createElement('div');
      s.className = `screw c${color}`;
      const v = document.createElement('div');
      v.className = 'slot-v';
      s.appendChild(v);
      el.appendChild(s);
    });

    if (!done) el.addEventListener('click', () => tap(idx));
    area.appendChild(el);
  });

  document.getElementById('moves-display').textContent = `moves: ${G.moves}`;
  document.getElementById('level-label').textContent = `Level ${G.level + 1} of ${LEVELS.length}`;

  const tier = LEVELS[G.level][3];
  const badge = document.getElementById('diff-badge');
  badge.textContent = TIER_NAMES[tier];
  badge.className = TIER_KEYS[tier];

  document.getElementById('next-btn').style.display = G.won ? 'inline-block' : 'none';
}

let msgTimer;
function showMsg(txt, ok = false) {
  const el = document.getElementById('message');
  el.textContent = txt;
  el.className = 'show' + (ok ? ' ok' : '');
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function shake(idx) {
  const els = document.querySelectorAll('.tube');
  if (!els[idx]) return;
  els[idx].classList.remove('shake');
  void els[idx].offsetWidth;
  els[idx].classList.add('shake');
}

// ── Interaction ────────────────────────────────────────────────────────────────

function tap(idx) {
  if (G.won) return;

  if (G.selected === null) {
    if (G.tubes[idx].length === 0 || isTubeDone(G.tubes[idx])) return;
    G.selected = idx;
    render(); return;
  }

  if (idx === G.selected) {
    G.selected = null;
    render(); return;
  }

  if (isValidMove(G.tubes, G.selected, idx)) {
    G.history.push({ tubes: clone(G.tubes), moves: G.moves });
    applyMove(G.tubes, G.selected, idx);
    G.moves++;
    G.selected = null;
    render();

    if (isSolved(G.tubes)) {
      G.won = true;
      G.completed.add(G.level);
      if (G.level + 1 > G.unlocked - 1) G.unlocked = Math.min(G.level + 2, LEVELS.length);
      saveProgress();
      render();
      setTimeout(() => {
        document.getElementById('win-stat').textContent =
          `${G.moves} move${G.moves !== 1 ? 's' : ''}`;
        document.getElementById('win-overlay').classList.add('show');
      }, 420);
      return;
    }

    if (allMoves(G.tubes).length === 0) showMsg('no moves left — undo to continue');
  } else {
    if (G.tubes[idx].length > 0 && !isTubeDone(G.tubes[idx])) {
      G.selected = idx; render();
    } else {
      shake(idx);
      showMsg("can't place here");
      G.selected = null; render();
    }
  }
}

// ── Level select overlay ───────────────────────────────────────────────────────

function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach(([,,,tier], i) => {
    const btn = document.createElement('button');
    btn.className = `lvl-btn ${TIER_TCLS[tier]}`;
    const locked = i >= G.unlocked;
    if (locked) btn.classList.add('locked');
    if (i === G.level) btn.classList.add('current');
    if (G.completed.has(i)) btn.classList.add('done');

    const num = document.createElement('div');
    num.className = 'lnum';
    num.textContent = locked ? '🔒' : (i + 1);

    const dot = document.createElement('div');
    dot.className = `lvl-dot ${TIER_DOTCLS[tier]}`;

    btn.appendChild(num);
    btn.appendChild(dot);

    if (!locked) {
      btn.addEventListener('click', () => {
        G.level = i;
        closeLevelOverlay();
        startLevel();
      });
    }
    grid.appendChild(btn);
  });
}

function openLevelOverlay() {
  buildLevelGrid();
  document.getElementById('level-overlay').classList.add('show');
}
function closeLevelOverlay() {
  document.getElementById('level-overlay').classList.remove('show');
}

document.getElementById('level-select-btn').addEventListener('click', openLevelOverlay);
document.getElementById('close-overlay').addEventListener('click', closeLevelOverlay);

// ── Controls ───────────────────────────────────────────────────────────────────

document.getElementById('undo-btn').addEventListener('click', () => {
  if (!G.history.length) { showMsg('nothing to undo'); return; }
  const prev = G.history.pop();
  G.tubes = prev.tubes; G.moves = prev.moves;
  G.selected = null; G.won = false;
  render();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  G.tubes = clone(G.initial);
  G.moves = 0; G.history = [];
  G.selected = null; G.won = false;
  render();
});

document.getElementById('next-btn').addEventListener('click', nextLevel);

function nextLevel() {
  document.getElementById('win-overlay').classList.remove('show');
  if (G.level < LEVELS.length - 1) G.level++;
  saveProgress();
  startLevel();
}

function closeWinGoSelect() {
  document.getElementById('win-overlay').classList.remove('show');
  openLevelOverlay();
}

function startLevel() {
  const [nc, ne, depth] = LEVELS[G.level];
  G.tubes = generatePuzzle(nc, ne, depth);
  G.initial = clone(G.tubes);
  G.selected = null; G.moves = 0;
  G.history = []; G.won = false;
  render();
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadProgress();
startLevel();
</script>
</body>
</html>
